<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - English Genius</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #5d5fef; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 50px; }
        header { background: #333; color: white; padding: 20px; text-align: center; }
        .tabs { display: flex; background: #eee; overflow-x: auto; position: sticky; top: 0; z-index: 100; }
        .tab-btn { background: #eee; border: none; padding: 15px; flex: 1; cursor: pointer; font-weight: bold; min-width: 100px; }
        .tab-btn.active { background: var(--primary); color: white; }
        .content { padding: 15px; max-width: 800px; margin: auto; }
        .box { background: white; padding: 15px; border-radius: 12px; display: none; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        input, select { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 12px; color: white; font-weight: bold; cursor: pointer; }
        .card { background: #fff; padding: 15px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .accept-btn { background: #28a745; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
        .delete-btn { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

<header><h2>إدارة منصة English Genius 👑</h2></header>

<div class="tabs">
    <button class="tab-btn active" onclick="tab('t1', this)">الطلاب</button>
    <button class="tab-btn" onclick="tab('t2', this)">الفيديوهات</button>
    <button class="tab-btn" onclick="tab('t3', this)">PDF</button>
</div>

<div class="content">
    <div id="t1" class="box" style="display:block">
        <h3>الطلاب المسجلين:</h3>
        <div id="sl">جاري التحميل...</div>
    </div>

    <div id="t2" class="box">
        <h3>رفع فيديو جديد (ثانوي)</h3>
        <input id="vt" placeholder="عنوان الفيديو">
        <input id="vl" placeholder="لينك الفيديو">
        <select id="vg">
            <option>الأول الثانوي</option>
            <option>الثاني الثانوي</option>
            <option>الثالث الثانوي</option>
        </select>
        <button class="btn" style="background:green" onclick="add('lessons', 'vt', 'vl', 'vg')">رفع الفيديو الآن</button>
    </div>

    <div id="t3" class="box">
        <h3>رفع مذكرة PDF (ثانوي)</h3>
        <input id="pt" placeholder="اسم المذكرة">
        <input id="pl" placeholder="لينك الملف">
        <select id="pg">
            <option>الأول الثانوي</option>
            <option>الثاني الثانوي</option>
            <option>الثالث الثانوي</option>
        </select>
        <button class="btn" style="background:blue" onclick="add('pdfs', 'pt', 'pl', 'pg')">رفع الملف الآن</button>
    </div>
</div>

<script>
    // نظام التمويه البرمجي - كلمة السر مشفرة
    const _authData = "aGh5eTA4YXNhcw=="; 
    const p = prompt("مرحباً مستر خالد.. أدخل كلمة السر للدخول:");
    
    if (btoa(p) !== _authData) {
        alert("كلمة سر خاطئة! لا يمكن الدخول.");
        document.body.innerHTML = "<h1 style='text-align:center; margin-top:50px;'>❌ دخول غير مسموح به</h1>";
    }

    const firebaseConfig = {
        apiKey: "AIzaSyA3zBT5rbd5xQdkKc5qwTg-XcL2BTThFRQ",
        authDomain: "khaled-platform-27373.firebaseapp.com",
        databaseURL: "https://khaled-platform-27373-default-rtdb.firebaseio.com",
        projectId: "khaled-platform-27373",
        storageBucket: "khaled-platform-27373.appspot.com",
        messagingSenderId: "143088371235",
        appId: "1:143088371235:web:72959ec1a269c74d389396"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function tab(id, el) {
        document.querySelectorAll('.box').forEach(x => x.style.display='none');
        document.getElementById(id).style.display='block';
        document.querySelectorAll('.tab-btn').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    db.ref('students').on('value', snap => {
        const div = document.getElementById('sl'); div.innerHTML = "";
        snap.forEach(c => {
            const s = c.val();
            const status = s.accepted ? "✅ مقبول" : "⏳ انتظار";
            div.innerHTML += `
                <div class="card">
                    <span><b>${s.name}</b><br><small>${s.grade} - ${status}</small></span>
                    <div>
                        ${!s.accepted ? `<button class="accept-btn" onclick="accept('${c.key}')">قبول</button>` : ''}
                        <button class="delete-btn" onclick="del('${c.key}')">حذف</button>
                    </div>
                </div>`;
        });
    });

    function accept(key) { db.ref('students/' + key).update({ accepted: true }).then(()=>alert("تم قبول الطالب")); }
    function del(key) { if(confirm("هل تريد حذف هذا الطالب؟")) db.ref('students/' + key).remove(); }
    
    function add(path, tId, lId, gId) {
        const title = document.getElementById(tId).value;
        const link = document.getElementById(lId).value;
        const grade = document.getElementById(gId).value;
        if(title && link) {
            db.ref(path).push({ title, link, grade }).then(() => {
                alert("تم الرفع بنجاح!");
                document.getElementById(tId).value = "";
                document.getElementById(lId).value = "";
            });
        } else {
            alert("يرجى إكمال البيانات");
        }
    }
</script>
</body>
</html>
