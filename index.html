<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Genius - دخول</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #5d5fef; --bg: #f5f7fb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; width: 90%; max-width: 400px; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
        .wa-btn { background: #25d366; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="color:var(--primary)">تسجيل الدخول</h2>
        <input type="tel" id="phone" placeholder="رقم الهاتف">
        <input type="password" id="pass" placeholder="كلمة المرور">
        <button class="btn" onclick="login()">دخول للمنصة 🚀</button>
        <a id="waLink" href="https://wa.me/20123456789" class="btn wa-btn" style="text-decoration:none">تواصل مع المستر لتفعيل الحساب</a>
        <p>ليس لديك حساب؟ <a href="register.html">اضغط هنا</a></p>
    </div>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyA3z8T5rbd5xQdKkCSqwTg-XcL2BTThfRQ",
        authDomain: "khaled-platform-27373.firebaseapp.com",
        databaseURL: "https://khaled-platform-27373-default-rtdb.firebaseio.com",
        projectId: "khaled-platform-27373",
        storageBucket: "khaled-platform-27373.firebasestorage.app",
        messagingSenderId: "143088371235",
        appId: "1:143088371235:web:72959ec1a269c74d389396"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function login() {
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        db.ref('students').orderByChild('phone').equalTo(phone).once('value', snap => {
            if(snap.exists()){
                snap.forEach(child => {
                    const u = child.val();
                    if(u.pass === pass) {
                        if(u.accepted) {
                            localStorage.setItem('studentId', child.key);
                            localStorage.setItem('studentGrade', u.grade);
                            localStorage.setItem('studentName', u.name);
                            location.href = 'dashboard.html';
                        } else { 
                            alert("حسابك قيد المراجعة..");
                            document.getElementById('waLink').style.display = 'block';
                        }
                    } else { alert("الباسورد خطأ!"); }
                });
            } else { alert("الرقم غير مسجل!"); }
        });
    }
</script>
</body>
</html>
