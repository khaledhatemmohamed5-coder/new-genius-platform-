<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - English Genius</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #5d5fef; --bg: #f5f7fb; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .main-container { background: white; width: 95%; max-width: 850px; display: flex; flex-wrap: wrap; border-radius: 25px; overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.1); }
        .brand-side { flex: 1; min-width: 300px; background: linear-gradient(135deg, #f0f4ff, #e0e8ff); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .brand-side img { width: 120px; border-radius: 50%; border: 3px solid white; }
        .form-side { flex: 1.5; min-width: 300px; padding: 30px; }
        .form-group { margin-bottom: 12px; text-align: right; }
        label { display: block; font-size: 12px; font-weight: bold; color: #666; margin-bottom: 3px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        .row { display: flex; gap: 10px; }
        .btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="main-container">
    <div class="brand-side">
        <img src="https://via.placeholder.com/120" alt="Logo">
        <h2>English Genius</h2>
        <p>تعلم الإنجليزية باحترافية</p>
    </div>
    <div class="form-side">
        <h3 style="margin:0 0 20px 0">إنشاء حساب 👤</h3>
        <div class="form-group"><label>الاسم الرباعي</label><input type="text" id="name"></div>
        <div class="row">
            <div class="form-group" style="flex:1"><label>المحافظة</label><select id="city"><option>سوهاج</option><option>القاهرة</option></select></div>
            <div class="form-group" style="flex:1"><label>الصف</label><select id="grade"><option>الأول الإعدادي</option><option>الثاني الإعدادي</option></select></div>
        </div>
        <div class="row">
            <div class="form-group" style="flex:1"><label>رقم الهاتف</label><input type="tel" id="phone"></div>
            <div class="form-group" style="flex:1"><label>رقم ولي الأمر</label><input type="tel" id="p_phone"></div>
        </div>
        <div class="form-group"><label>كلمة المرور</label><input type="password" id="pass"></div>
        <button class="btn" onclick="register()">إرسال الطلب 👤+</button>
    </div>
</div>
<script>
    const firebaseConfig = { /* نفس بياناتك */
        apiKey: "AIzaSyA3z8T5rbd5xQdKkCSqwTg-XcL2BTThfRQ",
        authDomain: "khaled-platform-27373.firebaseapp.com",
        databaseURL: "https://khaled-platform-27373-default-rtdb.firebaseio.com",
        projectId: "khaled-platform-27373",
        storageBucket: "khaled-platform-27373.firebasestorage.app",
        messagingSenderId: "143088371235",
        appId: "1:143088371235:web:72959ec1a269c74d389396"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    function register() {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('pass').value;
        if(name && phone && pass) {
            db.ref('students').push({
                name, phone, pass, city: document.getElementById('city').value,
                grade: document.getElementById('grade').value, accepted: false
            }).then(() => { alert("تم بنجاح!"); location.href = 'index.html'; });
        }
    }
</script>
</body>
</html>
