<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم مستر خالد 🛡️</title>
    <style>
        body { background: #0a0a0a; color: #00ff00; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .secure-box { border: 2px solid #00ff00; padding: 40px; border-radius: 20px; text-align: center; background: rgba(0, 0, 0, 0.9); box-shadow: 0 0 30px #00ff00; }
        input { background: #000; border: 1px solid #00ff00; color: #00ff00; padding: 15px; width: 280px; text-align: center; font-size: 22px; margin: 20px 0; border-radius: 10px; outline: none; }
        button { background: #00ff00; color: #000; border: none; padding: 15px 35px; font-weight: bold; cursor: pointer; border-radius: 10px; font-size: 18px; }
        #admin-panel { display: none; background: #fff; color: #000; position: fixed; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="login-screen">
    <div class="secure-box">
        <h2>نظام الحماية الرقمي 🔒</h2>
        <p>مرحباً مستر خالد.. ادخل كود العبور الجديد:</p>
        <input type="password" id="passCode" placeholder="********">
        <br>
        <button onclick="check()">تأكيد الهوية</button>
    </div>
</div>

<div id="admin-panel">
    <div style="background:#333; color:white; padding:15px; text-align:center; border-radius:10px;">
        <h2>أهلاً بك يا مستر خالد في لوحة التحكم الآمنة ✅</h2>
    </div>
    <br>
    <p>الآن أنت في أمان تام، وعبد الله لن يجد هذا الرابط أبداً.</p>
    <hr>
    <button onclick="location.reload()" style="background:#ff4d4d; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">تسجيل خروج</button>
</div>

<script>
    // كلمة السر الجديدة هي: MrKhaled@99#Secure
    // الرقم ده هو "بصمة" الكلمة، مستحيل حد يرجعه لأصله
    const _secretHash = -1886862598;

    function check() {
        const val = document.getElementById('passCode').value;
        if (doHash(val) === _secretHash) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("كود خاطئ! تم رصد محاولة دخول متطفلة.");
        }
    }

    function doHash(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) {
            h = ((h << 5) - h) + s.charCodeAt(i);
            h |= 0;
        }
        return h;
    }
</script>
</body>
</html>
