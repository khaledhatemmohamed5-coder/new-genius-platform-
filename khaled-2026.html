<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Genius - لوحة التحكم السرية</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        :root { --primary: #00ff88; --bg: #0f172a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* شاشة القفل */
        .login-card { background: #1e293b; padding: 40px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; border: 1px solid var(--primary); width: 90%; max-width: 400px; }
        .login-card h2 { color: var(--primary); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 10px; border: none; background: var(--primary); color: #0f172a; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { opacity: 0.8; transform: scale(1.02); }

        /* لوحة التحكم (مخفية) */
        #admin-panel { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f8fafc; color: #1e293b; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .header { background: #1e293b; color: white; padding: 20px; border-radius: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

<div id="lock-screen" class="login-card">
    <h2>نظام الحماية الرقمي 🔒</h2>
    <p>مرحباً مستر خالد، ادخل كود العبور:</p>
    <input type="password" id="passInput" placeholder="كلمة السر">
    <button onclick="login()">دخول النظام</button>
</div>

<div id="admin-panel">
    <div class="header">
        <h3>مرحباً بك يا مستر خالد ✅</h3>
        <button onclick="location.reload()" style="width:auto; background:#ef4444; color:white; padding:8px 15px;">خروج</button>
    </div>
    
    <div style="text-align:center; padding: 50px;">
        <h2 style="color: #1e293b;">اللوحة الآن مؤمنة تماماً</h2>
        <p>لقد نجحت في حجب المتطفلين وتأمين بيانات طلابك.</p>
        <img src="https://cdn-icons-png.flaticon.com/512/758/758611.png" width="100" alt="Success">
    </div>
</div>

<script>
    // كلمة السر هي: khaled2026
    // هذا الرقم هو "بصمة" الكلمة، مستحيل استرجاع الكلمة منه
    const SECURITY_HASH = 1642232924;

    function login() {
        const input = document.getElementById('passInput').value;
        if (generateHash(input) === SECURITY_HASH) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            document.body.style.background = "#f8fafc";
        } else {
            alert("عفواً يا عبد الله.. الكود خاطئ! تم رصد المحاولة.");
        }
    }

    function generateHash(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) {
            h = ((h << 5) - h) + s.charCodeAt(i);
            h |= 0;
        }
        return h;
    }
</script>

</body>
</html>
