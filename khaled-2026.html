<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المدير</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; padding-top: 100px; font-family: sans-serif; }
        input { padding: 12px; width: 220px; border-radius: 8px; border: 1px solid #0f0; background: #000; color: #0f0; font-size: 18px; text-align: center; }
        button { padding: 12px 25px; background: #0f0; color: #000; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 15px; }
    </style>
</head>
<body>
    <h2>قفل الحماية الرقمي 🛡️</h2>
    <input type="password" id="pass" placeholder="اكتب الكلمة هنا">
    <br>
    <button onclick="verify()">دخول</button>

    <div id="adminArea" style="display:none; background:white; color:black; position:fixed; top:0; left:0; width:100%; height:100%; padding:20px;">
        <h1>أهلاً مستر خالد ✅</h1>
        <p>اللوحة الآن تعمل بأمان تام وبعيداً عن عبد الله.</p>
        <button onclick="location.reload()" style="background:red; color:white;">خروج</button>
    </div>

    <script>
        function verify() {
            var i = document.getElementById('pass').value;
            // المعادلة الرياضية للكلمة الجديدة
            if (h(i) === 1642232924) {
                document.getElementById('adminArea').style.display = 'block';
            } else {
                alert("عفواً يا عبد الله.. الكود خاطئ!");
            }
        }
        function h(s) {
            let r = 0;
            for (let j = 0; j < s.length; j++) {
                r = ((r << 5) - r) + s.charCodeAt(j);
                r |= 0;
            }
            return r;
        }
    </script>
</body>
</html>
