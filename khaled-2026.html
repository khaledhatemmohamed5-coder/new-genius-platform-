<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>دخول المدير</title>
    <style>
        body { background: #000; color: #0f0; text-align: center; padding-top: 100px; font-family: sans-serif; }
        .box { border: 2px solid #0f0; padding: 20px; display: inline-block; border-radius: 10px; }
        input { padding: 10px; width: 200px; text-align: center; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #0f0; color: #000; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>نظام حماية مستر خالد 🛡️</h2>
        <input type="password" id="p" placeholder="كلمة السر">
        <br>
        <button onclick="check()">دخول</button>
    </div>

    <div id="admin" style="display:none; background:#fff; color:#000; position:fixed; top:0; left:0; width:100%; height:100%; padding:20px;">
        <h1>✅ تم الدخول بنجاح يا مستر خالد</h1>
        <p>اللوحة الآن مؤمنة تماماً بعيداً عن أعين المتطفلين.</p>
        <button onclick="location.reload()" style="background:red; color:white;">خروج آمن</button>
    </div>

    <script>
        function check() {
            var input = document.getElementById('p').value;
            // ده التشفير الرياضي لكلمة khaled2026
            if (hash(input) === 1642232924) {
                document.getElementById('admin').style.display = 'block';
            } else {
                alert("عفواً.. الكود خاطئ!");
            }
        }
        function hash(s) {
            let h = 0;
            for (let i = 0; i < s.length; i++) {
                h = ((h << 5) - h) + s.charCodeAt(i);
                h |= 0;
            }
            return h;
        }
    </script>
</body>
</html>
