<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام التأمين الرقمي - مستر خالد</title>
    <style>
        :root { --main-color: #00ffcc; --bg-dark: #050505; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .login-card { background: #111; padding: 30px; border-radius: 15px; border: 2px solid var(--main-color); text-align: center; box-shadow: 0 0 20px var(--main-color); width: 320px; }
        input { width: 100%; padding: 12px; margin: 15px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: var(--main-color); text-align: center; font-size: 18px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: var(--main-color); color: #000; font-weight: bold; cursor: pointer; font-size: 16px; }
        #admin-panel { display: none; background: white; color: black; position: fixed; top: 0; left: 0; width: 100%; height: 100%; padding: 20px; overflow-y: auto; text-align: right; }
    </style>
</head>
<body>

<div id="login-screen" class="login-card">
    <h2 style="color: var(--main-color);">دخول آمن 🔒</h2>
    <p>أهلاً مستر خالد، ادخل كود العبور:</p>
    <input type="password" id="passCode" placeholder="********">
    <button onclick="verify()">تأكيد الهوية</button>
</div>

<div id="admin-panel">
    <div style="background: #111; color: white; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
        <h3>لوحة تحكم المستر ✅</h3>
        <button onclick="location.reload()" style="width: auto; background: red; color: white; padding: 5px 15px;">خروج</button>
    </div>
    <div style="margin-top: 30px; text-align: center;">
        <h2>أهلاً بك يا مستر خالد.. اللوحة الآن في أمان تام.</h2>
        <p>تم تفعيل نظام التشفير الرياضي بنجاح.</p>
        <p>عبد الله دلوقت "خارج التغطية" تماماً.</p>
    </div>
</div>

<script>
    // كلمة السر هي: khaled2026
    // الرقم ده هو "البصمة الرياضية" للكلمة، لو عبد الله شافه مش هيفهم منه حاجة
    const SECRET_HASH = 1642232924;

    function verify() {
        const input = document.getElementById('passCode').value;
        if (doMath(input) === SECRET_HASH) {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("عفواً يا عبد الله.. الكود خاطئ! تم رصد محاولة دخول.");
        }
    }

    function doMath(s) {
        let h = 0;
        for (let i = 0; i < s.length; i++) {
            h = ((h << 5) - h) + s.charCodeAt(i);
            h |= 0; // تحويله لرقم 32-bit
        }
        return h;
    }
</script>

</body>
</html>
