<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Genius - مستر خالد</title>
    <style>
        :root { --primary: #6f42c1; --secondary: #00ffcc; --bg: #f8f9fa; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); }
        
        /* واجهة الطالب */
        .student-view { padding: 20px; max-width: 800px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .step-header { display: flex; align-items: center; color: var(--primary); font-weight: bold; margin-bottom: 15px; }
        .step-num { background: var(--primary); color: white; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-left: 10px; }
        .pay-numbers { background: #e9ecef; padding: 15px; border-radius: 10px; text-align: center; font-size: 22px; font-weight: bold; color: #111; border: 1px solid #ddd; }
        .btn-send { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; width: 100%; font-size: 18px; cursor: pointer; }

        /* لوحة المستر */
        #admin-auth { background: #111; color: white; padding: 30px; text-align: center; margin: 50px auto; border-radius: 15px; max-width: 350px; }
        #admin-panel { display: none; background: white; position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; padding: 20px; overflow-y: auto; box-sizing: border-box; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        .nav-bar { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div class="nav-bar">
    <h3 style="color: var(--primary); margin: 0;">English Genius 🎓</h3>
    <button onclick="showLogin()" style="background: none; border: 1px solid #ccc; padding: 7px 12px; cursor: pointer; border-radius: 8px;">دخول المستر 🔒</button>
</div>

<div class="student-view" id="student-view">
    <div class="card">
        <div class="step-header"><div class="step-num">1</div> خطوات الاشتراك</div>
        <p>قم بتحويل قيمة الكورس على الرقم التالي (فودافون كاش أو إنستا باي):</p>
        <div class="pay-numbers">
            01128312902
        </div>
        <p style="font-size: 13px; color: #666; text-align: center; margin-top: 5px;">تأكد من كتابة الرقم بشكل صحيح</p>
    </div>

    <div class="card">
        <div class="step-header"><div class="step-num">2</div> تأكيد الدفع</div>
        <label>اختر الكورس المراد الاشتراك به:</label>
        <select>
            <option>الترم الأول كامل</option>
            <option>اشتراك الشهر الحالي</option>
            <option>مراجعة ليلة الامتحان</option>
        </select>
        <input type="number" placeholder="المبلغ الذي تم تحويله">
        <input type="text" placeholder="رقم الموبايل الذي حولت منه">
        <button class="btn-send" onclick="alert('تم إرسال طلبك يا بطل! سيقوم مستر خالد بمراجعته وتفعيل حسابك خلال دقائق.')">إرسال طلب التفعيل 🚀</button>
    </div>
</div>

<div id="admin-auth" style="display: none;">
    <h3 style="color: var(--secondary);">خزنة المستر 🔐</h3>
    <input type="number" id="pass" placeholder="كود العبور" style="text-align: center;">
    <button class="btn-send" onclick="login()">دخول</button>
    <button onclick="hideLogin()" style="background: none; color: #888; margin-top: 15px; border: none; cursor: pointer;">رجوع لصفحة الطلاب</button>
</div>

<div id="admin-panel">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #eee; padding-bottom: 10px;">
        <h2>لوحة التحكم الإدارية ✅</h2>
        <button onclick="location.reload()" style="background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px;">خروج</button>
    </div>
    
    <div style="margin-top: 30px;">
        <h4 style="color: var(--primary);">📥 طلبات الطلاب الجديدة:</h4>
        <div style="background: #e7f3ff; padding: 20px; border-radius: 10px; border: 1px dashed #007bff; text-align: center; color: #555;">
            لا توجد طلبات جديدة تحتاج للموافقة.
        </div>
    </div>

    <div style="margin-top: 30px;">
        <h4>📚 إدارة المحتوى:</h4>
        <button style="background: #28a745; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 16px; cursor: pointer;">إضافة حصة أو ملف PDF +</button>
    </div>
</div>

<script>
    function showLogin() {
        document.getElementById('student-view').style.display = 'none';
        document.getElementById('admin-auth').style.display = 'block';
    }
    function hideLogin() {
        document.getElementById('student-view').style.display = 'block';
        document.getElementById('admin-auth').style.display = 'none';
    }
    function login() {
        // الكود السري الخاص بك
        if (document.getElementById('pass').value === "121290") {
            document.getElementById('admin-auth').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else {
            alert("الكود خاطئ.. محاولة دخول غير مصرح بها!");
        }
    }
</script>

</body>
</html>
